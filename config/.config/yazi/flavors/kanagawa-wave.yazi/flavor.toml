# vim:fileencoding=utf-8:foldmethod=marker
# Kanagawa Wave — Yazi theme
# Based on https://github.com/rebelot/kanagawa.nvim
#
# Palette reference:
# sumiInk0      "#16161d"   dark bg
# sumiInk3      "#1f1f28"   bg
# sumiInk4      "#2a2a37"
# sumiInk6      "#54546d"
# fujiWhite     "#dcd7ba"   fg
# oldWhite      "#c8c093"   dark fg
# fujiGray      "#727169"
# peachRed      "#ff5d62"
# autumnRed     "#c34043"
# crystalBlue   "#7e9cd8"
# waveRed       "#e46876"
# carpYellow    "#e6c384"
# springGreen   "#98bb6c"
# autumnGreen   "#76946a"
# oniViolet     "#957fb8"
# waveAqua1     "#6a9589"
# surimiOrange  "#ffa066"
# waveAqua2     "#7aa89f"

# : Manager {{{

[mgr]
cwd = { fg = "#e6c384" }
hovered = { fg = "#1f1f28", bg = "#7e9cd8" }
border_symbol = "│"
border_style = { fg = "#dcd7ba" }

find_keyword = { fg = "#ffa066", bg = "#1f1f28" }
find_position = {}

marker_copied = { fg = "#98bb6c", bg = "#98bb6c" }
marker_cut = { fg = "#e46876", bg = "#e46876" }
marker_marked = { fg = "#957fb8", bg = "#957fb8" }
marker_selected = { fg = "#ffa066", bg = "#ffa066" }

count_copied = { fg = "#1f1f28", bg = "#98bb6c" }
count_cut = { fg = "#1f1f28", bg = "#e46876" }
count_selected = { fg = "#1f1f28", bg = "#ffa066" }

# : }}}

# : Indicator {{{

[indicator]
parent = { reversed = true }
current = { reversed = true }
preview = { reversed = true }

# : }}}

# : Tabs {{{

[tabs]
active = { fg = "#1f1f28", bg = "#7e9cd8" }
inactive = { fg = "#7e9cd8", bg = "#2a2a37" }

sep_inner = { open = "", close = "" }
sep_outer = { open = "", close = "" }

# : }}}

# : Mode {{{

[mode]
normal_main = { fg = "#1f1f28", bg = "#7e9cd8" }
normal_alt = { fg = "#7e9cd8", bg = "#2a2a37" }

select_main = { fg = "#1f1f28", bg = "#957fb8" }
select_alt = { fg = "#957fb8", bg = "#2a2a37" }

unset_main = { fg = "#1f1f28", bg = "#e6c384" }
unset_alt = { fg = "#e6c384", bg = "#2a2a37" }

# : }}}

# : Status bar {{{

[status]
sep_left = { open = "", close = "" }
sep_right = { open = "", close = "" }
overall = { fg = "#c8c093", bg = "#16161d" }

perm_sep = { fg = "#957fb8" }
perm_type = { fg = "#98bb6c" }
perm_read = { fg = "#e6c384" }
perm_write = { fg = "#ff5d62" }
perm_exec = { fg = "#7aa89f" }

progress_label = { fg = "#7e9cd8", bold = true }
progress_normal = { fg = "#2a2a37", bg = "#1f1f28" }
progress_error = { fg = "#2a2a37", bg = "#1f1f28" }

# : }}}

# : Pick {{{

[pick]
border = { fg = "#7fb4ca" }
active = { fg = "#957fb8", bold = true }
inactive = {}

# : }}}

# : Input {{{

[input]
border = { fg = "#7fb4ca" }
title = {}
value = {}
selected = { reversed = true }

# : }}}

# : Completion {{{

[completion]
border = { fg = "#7fb4ca" }
active = { reversed = true }
inactive = {}

# : }}}

# : Tasks {{{

[tasks]
border = { fg = "#7fb4ca" }
title = {}
hovered = { fg = "#957fb8" }

# : }}}

# : Which {{{

[which]
cols = 2
separator = " - "
separator_style = { fg = "#727169" }
mask = { bg = "#16161d" }
rest = { fg = "#727169" }
cand = { fg = "#7e9cd8" }
desc = { fg = "#54546d" }

# : }}}

# : Help {{{

[help]
on = { fg = "#7aa89f" }
run = { fg = "#957fb8" }
desc = {}
hovered = { reversed = true, bold = true }
footer = { fg = "#1f1f28", bg = "#dcd7ba" }

# : }}}

# : Notification {{{

[notify]
title_info = { fg = "#98bb6c" }
title_warn = { fg = "#e6c384" }
title_error = { fg = "#ff5d62" }

# : }}}

# : File-specific styles {{{

[filetype]
rules = [
  { mime = "image/*", fg = "#e6c384" },
  { mime = "{audio,video}/*", fg = "#957fb8" },
  { mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#dcd7ba" },
  { mime = "application/{pdf,doc,rtf,vnd.*}", fg = "#6a9589" },
  { url = "*", is = "orphan", fg = "#c34043" },
  { url = "*", is = "exec", fg = "#76946a" },
  { url = "*", fg = "#dcd7ba" },
  { url = "*/", fg = "#7e9cd8" },
]

# : }}}

[icon]
dirs = [
  { name = ".config", text = "", fg = "#957fb8" },
  { name = ".git", text = "", fg = "#DCA561" },
  { name = ".github", text = "", fg = "#DCA561" },
  { name = ".npm", text = "", fg = "#7e9cd8" },
  { name = "Desktop", text = "", fg = "#7aa89f" },
  { name = "Development", text = "", fg = "#7aa89f" },
  { name = "Documents", text = "", fg = "#7aa89f" },
  { name = "Downloads", text = "", fg = "#7aa89f" },
  { name = "Library", text = "", fg = "#7aa89f" },
  { name = "Movies", text = "", fg = "#7aa89f" },
  { name = "Music", text = "", fg = "#7aa89f" },
  { name = "Pictures", text = "", fg = "#7aa89f" },
  { name = "Public", text = "", fg = "#7aa89f" },
  { name = "Videos", text = "", fg = "#7aa89f" },
]
conds = [
  # Special files
  { if = "orphan", text = "", fg = "#c8c093" },
  { if = "link", text = "", fg = "#54546d" },
  { if = "block", text = "", fg = "#ffa066" },
  { if = "char", text = "", fg = "#ffa066" },
  { if = "fifo", text = "", fg = "#ffa066" },
  { if = "sock", text = "", fg = "#ffa066" },
  { if = "sticky", text = "", fg = "#ffa066" },
  { if = "dummy", text = "", fg = "#c34043" },

  # Fallback
  { if = "dir & hovered", text = "", fg = "#7E9CD8" },
  { if = "dir", text = "", fg = "#7E9CD8" },
  { if = "exec", text = "", fg = "#98bb6c" },
  { if = "!dir", text = "", fg = "#c8c093" },
]
